<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS Campus Intelligence Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4fc3f7; text-align: center; }
        .chat-box { background: #1a1a1e; border: 1px solid #2e2e33; border-radius: 8px; padding: 20px; min-height: 200px; margin-bottom: 20px; }
        .message-input { width: 80%; padding: 12px; background: #2a2a30; border: 1px solid #3e3e44; color: #fff; border-radius: 4px; }
        .send-btn { width: 15%; padding: 12px; background: #00bcd4; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .send-btn:hover { background: #00acc1; }
        .result-card { background: #222226; border-left: 4px solid #00bcd4; padding: 15px; border-radius: 4px; margin-top: 15px; }
        pre { background: #111; padding: 10px; border-radius: 4px; overflow-x: auto; color: #a5d6a7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 MARS Campus Intelligence Dashboard</h1>
        <p style="text-align: center;">Ask your AI assistant about the Library, Cafeteria, or Events calendar live.</p>
        
        <div class="chat-box">
            <input type="text" id="userInput" class="message-input" placeholder="Type here (e.g., What's for lunch today?)...">
            <button onclick="sendMessage()" class="send-btn">Send</button>
            
            <div id="outputContainer" style="display: none;">
                <h3>🤖 Assistant Reply:</h3>
                <p id="assistantText" style="color: #81c784; font-size: 1.1em;"></p>
                <h3>📊 Live System Data Context Fetched:</h3>
                <pre id="jsonData"></pre>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const message = document.getElementById('userInput').value;
            if(!message) return;

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();

            document.getElementById('outputContainer').style.display = 'block';
            document.getElementById('assistantText').innerText = data.assistantReply;
            document.getElementById('jsonData').innerText = JSON.stringify(data.liveDataFetched, null, 2);
        }
    </script>
</body>
</html>
